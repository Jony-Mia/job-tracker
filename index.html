    <header class="container mt-20 m-auto w-[80%]">
        <h1 class="text-2xl font-bold ">Job Application Tracker</h1>
    </header>
    <section class="my-6">

        <section>
            <section class="grid w-[80%] m-auto gap-30 grid-cols-3">
                <div class=" shadow  rounded p-4">
                    <h1 class="text-xl ">Total</h1>
                    <p class="text-lg font-bold text-[24px]  mt-3" id="total">0</p>
                </div>
                <div class="shadow  rounded p-4">
                    <h1>Interview</h1>
                    <p id="interviewTotal" class="text-lg text-success  text-[24px] font-bold mt-3">0</p>
                </div>
                <div class="shadow rounded p-4">
                    <h1>Total</h1>
                    <p id="rejectTotal" class="text-lg text-error text-[24px] font-bold mt-3">0</p>
                </div>
            </section>
        </section>

    </section>
    <section>
        <section class="flex justify-between mt-10 w-[80%] m-auto">
            <h1 class="font-[600] text-[20px]">Available Jobs</h1>
            <span id="totalAll">8 Jobs</span>
        </section>
    </section>
    <section class=" mt-10 w-[80%] m-auto">
        <button onclick="filter('all')" class="btn text-white btn-info" >All</button>
        <button onclick="filter('interview')" class="btn " >Interview</button>
        <button onclick="filter('rejected')" class="btn " >Rejected</button>
    </section>
