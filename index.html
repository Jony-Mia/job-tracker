<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v7.2.0/css/fontawesome.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v7.2.0/css/regular.css">
    <link rel="stylesheet" href="style/daisyui@5.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>

<body>

    <header class="container mt-20 m-auto w-[80%]">
        <h1 class="text-2xl font-bold ">Job Application Tracker</h1>
    </header>
    <section class="my-6">

        <section>
            <section class="  w-[80%] m-auto gap-6 flex-wrap flex ">
                <div class=" sm:w-full md:w-[30%] w-[30%]  shadow  rounded p-4">
                    <h1 class="text-xl ">Total</h1>
                    <p class="text-lg font-bold text-[24px]  mt-3" id="total">0</p>
                </div>
                <div class=" sm:w-full md:w-[30%] w-[30%]  shadow  rounded p-4">
                    <h1>Interview</h1>
                    <p id="interviewTotal" class="text-lg text-success  text-[24px] font-bold mt-3">0</p>
                </div>
                <div class=" sm:w-full md:w-[30%] w-[30%]   shadow rounded p-4">
                    <h1>Total</h1>
                    <p id="rejectTotal" class="text-lg text-error text-[24px] font-bold mt-3">0</p>
                </div>
            </section>
        </section>

    </section>
    <section>
        <section class="flex justify-between mt-10 w-[80%] m-auto">
            <h1 class="font-[600] text-[20px]">Available Jobs</h1>
            <span id="totalAll">8 Jobs</span>
        </section>
    </section>
    <section class=" mt-10 w-[80%] m-auto">
        <button  onclick="filterJob('all')" class="btn text-white btn-info" >All</button>
        <button  onclick="filterJob('interview')" class="btn " >Interview</button>
        <button  onclick="filterJob('rejected')" class="btn " >Rejected</button>
    </section>

    <br>



            <div class="w-[80%] m-auto" id="interviewSection"></div>





      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="main.js"></script>
</body>

</html>
